# ELF-B training on hg38 genome with NucEL embeddings
# Preprocessed embeddings (no on-the-fly encoder needed)

# ── Data ──
data_path: /tmp/test_preproc
eval_data_path: /tmp/test_preproc
max_length: 1024

# ── Encoder (metadata only — actual encoder dim comes from meta.json) ──
encoder_model_name: "FreakingPotato/NucEL"
latent_mean: 0.0   # overridden from meta.json
latent_std: 1.0    # overridden from meta.json

# ── Model ──
model: ELF-B
vocab_size: 27
self_cond_prob: 0.0
num_time_tokens: 2
num_self_cond_cfg_tokens: 0
num_model_mode_tokens: 0
bottleneck_dim: 32

# ── Training ──
epochs: 3
global_batch_size: 4
batch_size: 4
grad_accum_steps: 1

# Optimizer
optimizer: adamw
weight_decay: 0.1
blr: 1.0e-4
lr: null        # computed from blr
min_lr: 1.0e-6
lr_schedule: cosine
warmup_steps: 50
grad_clip: 1.0

# EMA
ema_decay1: 0.999

# Decoder (disabled for initial DNA training)
decoder_prob: 0.0
decoder_noise_scale: 0.1
decoder_p_mean: -1.2
decoder_p_std: 1.2

# Denoiser
denoiser_p_mean: -1.2
denoiser_p_std: 1.2
t_eps: 0.0001
time_schedule: logit_normal

# Regularization
attn_dropout: 0.0
proj_dropout: 0.0

# ── Checkpointing & Logging ──
output_dir: outputs/elf-b-hg38-nucel
log_freq: 50
save_freq: 5000
num_workers: 4
seed: 42
resume: null
